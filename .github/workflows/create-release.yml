name: Create Release from RELEASE_NOTES

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.1) — if empty, the workflow will try to derive a tag'
        required: false
  push:
    tags: ['v*']

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create release from RELEASE_NOTES file
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            
            // Resolve tag: prefer manual input, then payload ref (strip refs/...), then github.context.ref, else fallback
            const inputTag = (context.payload && context.payload.inputs && context.payload.inputs.tag) ? context.payload.inputs.tag : null;
            const refTag = (context.payload && context.payload.ref) ? context.payload.ref : (github.context && github.context.ref ? github.context.ref : null);
            function cleanRef(r){ if (!r) return null; return r.replace(/^refs\/(tags|heads)\//,''); }
            const tag = inputTag || cleanRef(refTag) || 'v0.1.1';
            
            // Try to load release notes file matching the tag (e.g., v0.4.0 -> RELEASE_NOTES/v0.4.0.md)
            let body = '';
            try {
              const preferred = `RELEASE_NOTES/${tag}.md`;
              if (fs.existsSync(preferred)) {
                body = fs.readFileSync(preferred, 'utf8');
              } else {
                // Fallback: pick the first .md file in RELEASE_NOTES folder
                const files = fs.existsSync('RELEASE_NOTES') ? fs.readdirSync('RELEASE_NOTES').filter(f=>f.endsWith('.md')).sort().reverse() : [];
                if (files.length) body = fs.readFileSync(`RELEASE_NOTES/${files[0]}`, 'utf8');
              }
            } catch (e) { body = '' }

            // Create the release
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: body || 'Release notes not found.',
              draft: false,
              prerelease: false
            });
