<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Magic City Plant‑A‑Palooza — Vendor Map</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='mobile-viewer.css') }}?v={{ cachebuster }}">
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
  <!-- Hidden SVG with badge icon definitions (match desktop) -->
  <svg width="0" height="0" style="position:absolute;" aria-hidden="true">
    <defs>
      <g id="badge-event-staff" fill="none" fill-rule="evenodd">
        <path d="M28 0H6C4.9 0 4 .9 4 2v20c0 .9.6 1.7 1.5 1.9L16 27l10.5-3.1c.9-.2 1.5-1 1.5-1.9V2c0-1.1-.9-2-2-2z" style="fill:var(--danger);opacity:0.28" transform="translate(0 -1)" />
        <path d="M6 0v22l10-3 10 3V0H6z" style="fill:rgba(0,0,0,0.06)" transform="translate(0 -1)" />
        <g transform="translate(0.5 1.3) scale(1.444)">
          <circle cx="11" cy="5" r="2.8" fill="var(--danger)" />
          <path d="M7 12c0-3 8-3 8 0v2H7v-2z" fill="var(--danger)" />
        </g>
      </g>
      <g id="badge-partner-vendor" fill="none" fill-rule="evenodd">
        <path d="M28 0H6C4.9 0 4 .9 4 2v20c0 .9.6 1.7 1.5 1.9L16 27l10.5-3.1c.9-.2 1.5-1 1.5-1.9V2c0-1.1-.9-2-2-2z" style="fill:#3498DB;opacity:0.28" transform="translate(0 -1)" />
        <path d="M6 0v22l10-3 10 3V0H6z" style="fill:rgba(0,0,0,0.06)" transform="translate(0 -1)" />
        <g transform="translate(2 1.5) scale(1.17)">
          <path d="M8 4 L16 4 L16 6 L8 6 Z" fill="#5DADE2" />
          <path d="M8 4 L4 8 L8 6 Z" fill="#3498DB" />
          <path d="M16 4 L20 8 L16 6 Z" fill="#3498DB" />
          <path d="M8 6 L4 8 L12 8 Z" fill="#2E86C1" />
          <path d="M16 6 L20 8 L12 8 Z" fill="#2E86C1" />
          <path d="M4 8 L12 8 L12 18 Z" fill="#2874A6" />
          <path d="M12 8 L20 8 L12 18 Z" fill="#5DADE2" />
          <path d="M8 4 L16 4 L20 8 L12 18 L4 8 Z" fill="none" stroke="#1B4F72" stroke-width="0.6" />
        </g>
      </g>
      <g id="badge-featured-vendor" fill="none" fill-rule="evenodd">
        <path d="M28 0H6C4.9 0 4 .9 4 2v20c0 .9.6 1.7 1.5 1.9L16 27l10.5-3.1c.9-.2 1.5-1 1.5-1.9V2c0-1.1-.9-2-2-2z" style="fill:#FFD700;opacity:0.28" transform="translate(0 -1)" />
        <path d="M6 0v22l10-3 10 3V0H6z" style="fill:rgba(0,0,0,0.06)" transform="translate(0 -1)" />
        <g transform="translate(4.8 1.8) scale(0.931)">
          <path d="M12 2 L14.5 9 L22 9 L16 14 L18.5 21 L12 16 L5.5 21 L8 14 L2 9 L9.5 9 Z" fill="#FFD700" stroke="#FFD700" stroke-width="0.5" />
        </g>
      </g>
      <g id="badge-returning-vendor" fill="none" fill-rule="evenodd">
        <path d="M28 0H6C4.9 0 4 .9 4 2v20c0 .9.6 1.7 1.5 1.9L16 27l10.5-3.1c.9-.2 1.5-1 1.5-1.9V2c0-1.1-.9-2-2-2z" style="fill:var(--accent);opacity:0.28" transform="translate(0 -1)" />
        <path d="M6 0v22l10-3 10 3V0H6z" style="fill:rgba(0,0,0,0.06)" transform="translate(0 -1)" />
        <g transform="translate(2 -2) scale(0.8)">
          <path d="M10 12 L18 6 L18 18 Z" fill="var(--hi)" />
          <path d="M18 12 A8 8 0 0 1 18 28 A8 8 0 0 1 10 20" fill="none" stroke="var(--hi)" stroke-width="2.5" stroke-linecap="round" />
        </g>
      </g>
      <!-- Ribbon only – category badge with emoji -->
      <g id="badge-ribbon-only" fill="none" fill-rule="evenodd">
        <path class="badge-ribbon-fill" d="M28 0H6C4.9 0 4 .9 4 2v20c0 .9.6 1.7 1.5 1.9L16 27l10.5-3.1c.9-.2 1.5-1 1.5-1.9V2c0-1.1-.9-2-2-2z" fill="currentColor" style="opacity:0.52" transform="translate(0 -1)" />
        <path d="M6 0v22l10-3 10 3V0H6z" style="fill:rgba(0,0,0,0.06)" transform="translate(0 -1)" />
      </g>
    </defs>
  </svg>

  <header class="mv-header">
    <div class="mv-brand">🌱 Magic City Plant‑A‑Palooza</div>
  </header>

  <main class="mv-main">
    <section id="mvListPanel" class="mv-panel mv-panel-list" role="tabpanel">
      <div class="mv-search-wrap">
        <input type="search" id="mvSearch" class="mv-search" placeholder="Search by #, business, vendor…" aria-label="Search by booth number, business, vendor">
      </div>
      <div id="mvBoothList" class="mv-booth-list"></div>
    </section>

    <section id="mvMapPanel" class="mv-panel mv-panel-map active" role="tabpanel">
      <div id="mvMap" class="mv-map"></div>
    </section>
  </main>

  <nav class="mv-tabs" role="tablist">
    <button type="button" class="mv-tab active" data-tab="map" role="tab" aria-selected="true">Map</button>
    <button type="button" class="mv-tab" data-tab="list" role="tab" aria-selected="false">List</button>
  </nav>

  <!-- Detail sheet (slide-up panel when a booth is selected) -->
  <aside id="mvDetailSheet" class="mv-detail-sheet" aria-hidden="true">
    <div class="mv-detail-backdrop" id="mvDetailBackdrop"></div>
    <div class="mv-detail-content">
      <header class="mv-detail-header">
        <h2 class="mv-detail-title">Booth # <span id="mvDetailBoothId">—</span></h2>
        <button type="button" class="mv-detail-view-on-map" id="mvDetailViewOnMap" aria-label="View this booth on the map">View on Map</button>
        <button type="button" class="mv-detail-close" id="mvDetailClose" aria-label="Close">×</button>
      </header>
      <div class="mv-detail-body" id="mvDetailBody">
        <!-- Filled by JS -->
      </div>
    </div>
  </aside>

  <script id="mvBootstrap" type="application/json">
  {{ {'DEFAULTS': defaults, 'MAP_ID': map_id}|tojson }}
  </script>
  <script>
    (function(){
      try {
        const boot = JSON.parse(document.getElementById('mvBootstrap').textContent || '{}');
        window.__MV_DEFAULTS__ = boot.DEFAULTS || {};
        window.__MV_MAP_ID__ = boot.MAP_ID || '';
      } catch(e) {
        window.__MV_DEFAULTS__ = {};
        window.__MV_MAP_ID__ = '';
      }
    })();
  </script>
  <!-- Desktop viewport: redirect to main app; resize to mobile width sends here from main app -->
  <script>
    (function(){
      var desktopQuery = window.matchMedia && window.matchMedia('(min-width: 768px)');
      function isDesktopViewport() { return desktopQuery && desktopQuery.matches; }
      function sendToDesktop() {
        if (isDesktopViewport()) window.location.replace('/');
      }
      if (!desktopQuery) {
        if (typeof window.innerWidth === 'number' && window.innerWidth >= 768) window.location.replace('/');
        return;
      }
      if (isDesktopViewport()) { window.location.replace('/'); return; }
      var onChange = function(){ if (isDesktopViewport()) sendToDesktop(); };
      if (desktopQuery.addListener) desktopQuery.addListener(onChange);
      else if (desktopQuery.addEventListener) desktopQuery.addEventListener('change', onChange);
    })();
  </script>
  <script async defer src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMobileMap&loading=async&v=quarterly"></script>
  <script src="{{ url_for('static', filename='js/mobile-viewer.js') }}?v={{ cachebuster }}"></script>
</body>
</html>
