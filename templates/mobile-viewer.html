<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Magic City Plant‑A‑Palooza — Vendor Map</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='mobile-viewer.css') }}?v={{ cachebuster }}">
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
  <!-- Hidden SVG with badge icon definitions (match desktop) -->
  <svg width="0" height="0" style="position:absolute;" aria-hidden="true">
    <defs>
      <g id="badge-event-staff" fill="none" fill-rule="evenodd">
        <path d="M28 0H6C4.9 0 4 .9 4 2v20c0 .9.6 1.7 1.5 1.9L16 27l10.5-3.1c.9-.2 1.5-1 1.5-1.9V2c0-1.1-.9-2-2-2z" style="fill:var(--danger);opacity:0.28" transform="translate(0 -1)" />
        <path d="M6 0v22l10-3 10 3V0H6z" style="fill:rgba(0,0,0,0.06)" transform="translate(0 -1)" />
        <g transform="translate(0.5 1.3) scale(1.444)">
          <circle cx="11" cy="5" r="2.8" fill="var(--danger)" />
          <path d="M7 12c0-3 8-3 8 0v2H7v-2z" fill="var(--danger)" />
        </g>
      </g>
      <g id="badge-partner-vendor" fill="none" fill-rule="evenodd">
        <path d="M28 0H6C4.9 0 4 .9 4 2v20c0 .9.6 1.7 1.5 1.9L16 27l10.5-3.1c.9-.2 1.5-1 1.5-1.9V2c0-1.1-.9-2-2-2z" style="fill:#3498DB;opacity:0.28" transform="translate(0 -1)" />
        <path d="M6 0v22l10-3 10 3V0H6z" style="fill:rgba(0,0,0,0.06)" transform="translate(0 -1)" />
        <g transform="translate(2 1.5) scale(1.17)">
          <path d="M8 4 L16 4 L16 6 L8 6 Z" fill="#5DADE2" />
          <path d="M8 4 L4 8 L8 6 Z" fill="#3498DB" />
          <path d="M16 4 L20 8 L16 6 Z" fill="#3498DB" />
          <path d="M8 6 L4 8 L12 8 Z" fill="#2E86C1" />
          <path d="M16 6 L20 8 L12 8 Z" fill="#2E86C1" />
          <path d="M4 8 L12 8 L12 18 Z" fill="#2874A6" />
          <path d="M12 8 L20 8 L12 18 Z" fill="#5DADE2" />
          <path d="M8 4 L16 4 L20 8 L12 18 L4 8 Z" fill="none" stroke="#1B4F72" stroke-width="0.6" />
        </g>
      </g>
      <g id="badge-featured-vendor" fill="none" fill-rule="evenodd">
        <path d="M28 0H6C4.9 0 4 .9 4 2v20c0 .9.6 1.7 1.5 1.9L16 27l10.5-3.1c.9-.2 1.5-1 1.5-1.9V2c0-1.1-.9-2-2-2z" style="fill:#FFD700;opacity:0.28" transform="translate(0 -1)" />
        <path d="M6 0v22l10-3 10 3V0H6z" style="fill:rgba(0,0,0,0.06)" transform="translate(0 -1)" />
        <g transform="translate(4.8 1.8) scale(0.931)">
          <path d="M12 2 L14.5 9 L22 9 L16 14 L18.5 21 L12 16 L5.5 21 L8 14 L2 9 L9.5 9 Z" fill="#FFD700" stroke="#FFD700" stroke-width="0.5" />
        </g>
      </g>
      <g id="badge-returning-vendor" fill="none" fill-rule="evenodd">
        <path d="M28 0H6C4.9 0 4 .9 4 2v20c0 .9.6 1.7 1.5 1.9L16 27l10.5-3.1c.9-.2 1.5-1 1.5-1.9V2c0-1.1-.9-2-2-2z" style="fill:var(--accent);opacity:0.28" transform="translate(0 -1)" />
        <path d="M6 0v22l10-3 10 3V0H6z" style="fill:rgba(0,0,0,0.06)" transform="translate(0 -1)" />
        <g transform="translate(2 -2) scale(0.8)">
          <path d="M10 12 L18 6 L18 18 Z" fill="var(--hi)" />
          <path d="M18 12 A8 8 0 0 1 18 28 A8 8 0 0 1 10 20" fill="none" stroke="var(--hi)" stroke-width="2.5" stroke-linecap="round" />
        </g>
      </g>
      <!-- Ribbon only – category badge with emoji -->
      <g id="badge-ribbon-only" fill="none" fill-rule="evenodd">
        <path class="badge-ribbon-fill" d="M28 0H6C4.9 0 4 .9 4 2v20c0 .9.6 1.7 1.5 1.9L16 27l10.5-3.1c.9-.2 1.5-1 1.5-1.9V2c0-1.1-.9-2-2-2z" fill="currentColor" style="opacity:0.52" transform="translate(0 -1)" />
        <path d="M6 0v22l10-3 10 3V0H6z" style="fill:rgba(0,0,0,0.06)" transform="translate(0 -1)" />
      </g>
    </defs>
  </svg>

  <header class="mv-header">
    <div class="mv-brand">🌱 Magic City Plant‑A‑Palooza</div>
    <div class="mv-spacer"></div>
    <button type="button" id="mvMenuBtn" class="mv-menu-btn" aria-label="Open menu" aria-expanded="false" aria-controls="mvMenuDrawer">
      <svg class="mv-menu-btn-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <line x1="4" y1="6" x2="20" y2="6"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="18" x2="20" y2="18"/>
      </svg>
    </button>
  </header>

  <div id="mvMenuBackdrop" class="mv-menu-backdrop" aria-hidden="true"></div>
  <aside id="mvMenuDrawer" class="mv-menu-drawer" role="dialog" aria-modal="true" aria-label="Menu" aria-hidden="true">
    <div class="mv-menu-drawer-inner">
      <div class="mv-menu-drawer-top">
        <h2 class="mv-menu-drawer-title">Menu</h2>
        <button type="button" id="mvMenuClose" class="mv-menu-close" aria-label="Close menu">×</button>
      </div>

      <section class="mv-menu-section" aria-labelledby="mvMenuEventHeading">
        <h3 id="mvMenuEventHeading" class="mv-menu-section-title">Event date</h3>
        <div class="mv-day-filter-wrap mv-day-filter-wrap--menu">
          <label for="mvMapDaySelect" class="mv-day-filter-label">Date</label>
          <select id="mvMapDaySelect" class="mv-day-filter-select" aria-label="View event date on map" title="Show booths scheduled for this date">
          </select>
        </div>
      </section>

      <section class="mv-menu-section">
        <a href="{{ url_for('mobile_vendor_list') }}" class="mv-menu-vendors-link">Browse Vendor List</a>
      </section>

      <section class="mv-menu-section mv-menu-section--legend" aria-labelledby="mvLegendHeaderTitle">
        <div id="mvBadgeLegend" class="mv-badge-legend mv-badge-legend--menu" role="region" aria-label="Badge legend">
          <div class="mv-legend-header" role="button" tabindex="0" aria-expanded="true" aria-controls="mvLegendItems">
            <div class="mv-legend-title" id="mvLegendHeaderTitle">Badge legend</div>
            <span class="mv-legend-toggle" aria-hidden="true" title="Collapse or expand">
              <svg width="18" height="18" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </div>
          <div class="mv-legend-items" id="mvLegendItems">
            <div class="mv-legend-section-label">Categories</div>
            <div class="mv-legend-item mv-legend-category-item">
              <div class="mv-legend-icon mv-legend-category-icon" aria-hidden="true">🪴</div>
              <span>Plant Vendor</span>
            </div>
            <div class="mv-legend-item mv-legend-category-item">
              <div class="mv-legend-icon mv-legend-category-icon" aria-hidden="true">🎨</div>
              <span>Craft Vendor</span>
            </div>
            <div class="mv-legend-item mv-legend-category-item">
              <div class="mv-legend-icon mv-legend-category-icon" aria-hidden="true">🍽️</div>
              <span>Food &amp; Drink</span>
            </div>
            <div class="mv-legend-item mv-legend-category-item">
              <div class="mv-legend-icon mv-legend-category-icon" aria-hidden="true">🎪</div>
              <span>Entertainment</span>
            </div>
            <div class="mv-legend-item mv-legend-category-item">
              <div class="mv-legend-icon mv-legend-category-icon" aria-hidden="true">✨</div>
              <span>Miscellaneous</span>
            </div>
            <div class="mv-legend-section-label">Vendor status</div>
            <div class="mv-legend-item">
              <div class="mv-legend-icon mv-legend-event-staff-icon">
                <svg width="22" height="22" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <use href="#badge-event-staff" />
                </svg>
              </div>
              <span>Event Staff</span>
            </div>
            <div class="mv-legend-item">
              <div class="mv-legend-icon mv-legend-partner-icon">
                <svg width="22" height="22" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <use href="#badge-partner-vendor" />
                </svg>
              </div>
              <span>Partner Vendor</span>
            </div>
            <div class="mv-legend-item">
              <div class="mv-legend-icon mv-legend-featured-icon">
                <svg width="22" height="22" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <use href="#badge-featured-vendor" />
                </svg>
              </div>
              <span>Featured Vendor</span>
            </div>
            <div class="mv-legend-item">
              <div class="mv-legend-icon mv-legend-return-vendor-icon">
                <svg width="22" height="22" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <use href="#badge-returning-vendor" />
                </svg>
              </div>
              <span>Returning Vendor</span>
            </div>
          </div>
        </div>
      </section>
    </div>
  </aside>

  <main class="mv-main">
    <section id="mvMapPanel" class="mv-panel mv-panel-map active" aria-label="Vendor map">
      <div class="mv-map-day-bar" id="mvMapDayBar" role="status" aria-live="polite">
        <span class="mv-map-day-bar-label" id="mvMapDayBarText"></span>
      </div>
      <div id="mvMap" class="mv-map"></div>
      <div class="mv-map-controls" role="group" aria-label="Map options">
        <button type="button" class="mv-map-ctrl" id="mvMapCenter" aria-label="Center map on all booths" title="Center map on booths">
          <svg class="mv-map-ctrl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <line x1="12" y1="2" x2="12" y2="6"/>
            <line x1="12" y1="18" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="6" y2="12"/>
            <line x1="18" y1="12" x2="22" y2="12"/>
          </svg>
        </button>
        <button type="button" class="mv-map-ctrl mv-map-ctrl-labels" id="mvMapLabels" aria-label="Toggle map labels" title="Map labels">
          <svg class="mv-map-ctrl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 7h16M4 12h12M4 17h10"/>
          </svg>
        </button>
      </div>
    </section>
  </main>

  <!-- Detail sheet (slide-up panel when a booth is selected) -->
  <aside id="mvDetailSheet" class="mv-detail-sheet" aria-hidden="true">
    <div class="mv-detail-backdrop" id="mvDetailBackdrop"></div>
    <div class="mv-detail-content">
      <header class="mv-detail-header">
        <h2 class="mv-detail-title">Booth # <span id="mvDetailBoothId">—</span></h2>
        <button type="button" class="mv-detail-view-on-map" id="mvDetailViewOnMap" aria-label="View this booth on the map">View on Map</button>
        <button type="button" class="mv-detail-close" id="mvDetailClose" aria-label="Close">×</button>
      </header>
      <div class="mv-detail-body" id="mvDetailBody">
        <!-- Filled by JS -->
      </div>
    </div>
  </aside>

  <script id="mvBootstrap" type="application/json">
  {{ {'DEFAULTS': defaults, 'MAP_ID': map_id}|tojson }}
  </script>
  <script>
    (function(){
      try {
        const boot = JSON.parse(document.getElementById('mvBootstrap').textContent || '{}');
        window.__MV_DEFAULTS__ = boot.DEFAULTS || {};
        window.__MV_MAP_ID__ = boot.MAP_ID || '';
      } catch(e) {
        window.__MV_DEFAULTS__ = {};
        window.__MV_MAP_ID__ = '';
      }
    })();
  </script>
  <!-- Desktop viewport: redirect to main app. Use 1025px to match index.html (mobile <= 1024, desktop > 1024). -->
  <script>
    (function(){
      var DESKTOP_MIN_WIDTH = 1025;
      var desktopQuery = window.matchMedia && window.matchMedia('(min-width: ' + DESKTOP_MIN_WIDTH + 'px)');
      function isDesktopViewport() {
        if (desktopQuery && desktopQuery.matches) return true;
        return typeof window.innerWidth === 'number' && window.innerWidth >= DESKTOP_MIN_WIDTH;
      }
      function maybeRedirectToDesktop() {
        if (!isDesktopViewport()) return;
        window.location.replace('/');
      }
      if (!desktopQuery) {
        if (typeof window.innerWidth === 'number' && window.innerWidth >= DESKTOP_MIN_WIDTH) window.location.replace('/');
        return;
      }
      maybeRedirectToDesktop();
      // Recheck after a short delay so emulator/viewport has correct size on refresh
      setTimeout(maybeRedirectToDesktop, 120);
      var onChange = function() { if (isDesktopViewport()) maybeRedirectToDesktop(); };
      if (desktopQuery.addEventListener) desktopQuery.addEventListener('change', onChange);
      else if (desktopQuery.addListener) desktopQuery.addListener(onChange);
      var resizeTick;
      window.addEventListener('resize', function() {
        clearTimeout(resizeTick);
        resizeTick = setTimeout(maybeRedirectToDesktop, 150);
      });
    })();
  </script>
  <script src="{{ url_for('static', filename='js/scheduled-days.js') }}?v={{ cachebuster }}"></script>
  <script src="{{ url_for('static', filename='js/mobile-detail-html.js') }}?v={{ cachebuster }}"></script>
  <script async defer src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMobileMap&loading=async&v=quarterly"></script>
  <script src="{{ url_for('static', filename='js/mobile-viewer.js') }}?v={{ cachebuster }}"></script>
</body>
</html>
